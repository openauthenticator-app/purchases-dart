name: purchases_dart
description: "A pure Dart implementation of purchases_flutter (aka RevenueCat), designed to facilitate in-app purchases and subscriptions with Web Billing."
version: 2.0.0
homepage: https://navideck.com
repository: https://github.com/Navideck/purchases_dart
issue_tracker: https://github.com/Navideck/purchases_dart/issues
documentation: https://github.com/Navideck/purchases_dart#readme
funding:
  - https://github.com/sponsors/Navideck

topics:
  - in-app-purchases
  - subscriptions
  - revenuecat
  - web-billing
  - payments

environment:
  sdk: ">=3.2.5 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  purchases_flutter: '>=10.0.0 <11.0.0'
  uuid: ^4.5.3
  hashlib: ^2.3.0
  http: ^1.6.0
  http_client_interceptor: ^1.0.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_lints: ^6.0.0
